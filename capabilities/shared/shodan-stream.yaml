name: shodan-stream
description: >-
  Real-time streaming firehose capability for Shodan banner data. Use these
  operations when you want to push banners directly into a SIEM, data lake,
  or alerting pipeline as Shodan collects them.
provider: shodan
api: shodan-streaming-api
operations:
  - id: streamBanners
    method: GET
    path: /shodan/banners
    description: Subscribe to the full Shodan firehose of banner events.
  - id: streamBannersByAsn
    method: GET
    path: /shodan/asn/{asn}
    description: Subscribe to banner events filtered by one or more Autonomous System Numbers.
  - id: streamBannersByCountry
    method: GET
    path: /shodan/countries/{countries}
    description: Subscribe to banner events filtered by one or more country codes.
  - id: streamBannersByPort
    method: GET
    path: /shodan/ports/{ports}
    description: Subscribe to banner events filtered by one or more ports.
  - id: streamBannersByVuln
    method: GET
    path: /shodan/vulns/{vulns}
    description: Subscribe to banner events filtered by one or more CVE identifiers.
