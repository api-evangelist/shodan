specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Shodan
providerId: shodan
created: '2026-05-28'
modified: '2026-05-30'
reconciled: false
tags:
  - Security
  - Search
  - Internet
  - Vulnerabilities
  - Threat Intelligence
description: >-
  Shodan publishes a public, self-service pricing surface consisting of a
  one-time Membership tier and three monthly subscription tiers (Freelancer,
  Small Business, Corporate) plus a negotiated Enterprise contract. Each tier
  budgets three core metered resources — query credits, scan credits, and
  monitored IPs — and gates feature flags such as advanced filter access,
  vulnerability search, batch IP lookups, and streaming firehose tier. The
  free Developer tier comes with any Shodan account registration.
sources:
  - https://account.shodan.io/billing
  - https://developer.shodan.io/api
  - https://developer.shodan.io/api/stream
  - https://cvedb.shodan.io/
  - https://internetdb.shodan.io/
plans:
  - id: shodan-developer
    name: Developer (Free)
    type: free
    description: >-
      Free tier available with any registered Shodan account. Limited query
      and scan credits, with the most restrictive filter access.
    entries:
      - label: Query Credits
        name: query_credits
        type: included
        metric: credit
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: 0
        userMultiplied: false
      - label: Scan Credits
        name: scan_credits
        type: included
        metric: credit
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: 0
        userMultiplied: false
      - label: Monitored IPs
        name: monitored_ips
        type: included
        metric: ip
        limit: 16
        timeFrame: usage
        geo: global
        unit: 1
        price: 0
        userMultiplied: false
    elements:
